# I believe those properties are straight up useless anyway
# because they aren't used for rooms, they are used for profession rooms (which aren't actually used)
# 
# basically isUseless applies to all the parameters in reality
# isShop, professionChance and outfit are technically used in functions that would involve them
# but in practice it seems that not a single vanilla room even uses these properties
#
# the only place where one of those is used, is for outfit with profession 
# entries inside distributionTable of Distributions.lua
# and I'm pretty sure those entries are unused



# those are the parameters which get parsed in the ItemPickerJava.java class
# some are unused and are marked as such with isUseless: true
- name: isShop
  type: boolean
- name: professionChance
  isUseless: true
- name: outfit
  description: Dead bodies that spawn naturally in the room will have a chance to spawn with the outfit defined here.

